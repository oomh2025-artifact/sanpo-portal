<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>キーワード検索 - SANPO PORTAL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #ffffff;
      --bg-secondary: #fafafa;
      --text: #18181b;
      --text-muted: #71717a;
      --text-light: #a1a1aa;
      --border: #e4e4e7;
      --border-light: #f4f4f5;
      --accent-1: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #ec4899;
    }
    body { 
      font-family: "Inter", "Noto Sans JP", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-light);
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 18px 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-size: 1rem; font-weight: 600; letter-spacing: 0.02em;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; color: white; }
    nav { display: flex; gap: 36px; }
    nav a {
      font-size: 0.875rem; font-weight: 450; color: var(--text-muted);
      text-decoration: none; transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: var(--text); }
    main { max-width: 1200px; margin: 0 auto; padding: 120px 40px 80px; }
    @media (max-width: 768px) {
      .header-inner { padding: 14px 20px; }
      nav { gap: 20px; }
      nav a { font-size: 0.8rem; }
      main { padding: 100px 20px 60px; }
    }

    .page-header {
      padding: 40px 0 40px;
    }
    .page-header h1 {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .page-header p {
      font-size: 1rem;
      color: var(--text-muted);
    }
    .search-box {
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 32px;
    }
    .search-input-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .search-input:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .search-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    .search-options {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .search-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .search-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-1);
    }
    .search-option label {
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
    }
    .synonyms-info {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--accent-1);
      display: none;
    }
    .synonyms-info.show {
      display: block;
    }
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .results-count {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .results-count strong {
      color: var(--accent-1);
    }
    .result-item {
      display: block;
      padding: 20px 24px;
      background: var(--bg-secondary);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .result-item:hover {
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transform: translateX(4px);
    }
    .result-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .result-item:hover .result-title {
      color: var(--accent-1);
    }
    .result-title mark {
      background: rgba(245, 158, 11, 0.3);
      color: inherit;
      padding: 0 2px;
      border-radius: 2px;
    }
    .result-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .result-journal {
      display: inline-block;
      padding: 4px 10px;
      background: var(--border-light);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-right: 12px;
    }
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .no-results h3 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .initial-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .initial-state svg {
      width: 48px;
      height: 48px;
      color: var(--border);
      margin-bottom: 16px;
    }
  </style>
</head>

  <main>
    <div class="page-header">
      <h1>キーワード検索</h1>
      <p>6つの学術誌からキーワードで論文を検索</p>
    </div>
    
    <div class="search-box">
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="キーワードを入力（例: メンタルヘルス、ストレス）" />
        <button class="search-btn" onclick="doSearch()">検索</button>
      </div>
      <div class="search-options">
        <div class="search-option">
          <input type="radio" name="searchMode" id="exactMatch" value="exact" checked />
          <label for="exactMatch">完全一致</label>
        </div>
        <div class="search-option">
          <input type="radio" name="searchMode" id="synonymMatch" value="synonym" />
          <label for="synonymMatch">類義語も検索</label>
        </div>
      </div>
      <div class="synonyms-info" id="synonymsInfo"></div>
    </div>
    
    <div id="resultsArea">
      <div class="initial-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>

      </div>
    </div>

    const thesaurus = {"メンタルヘルス": ["精神保健", "心の健康", "メンタル", "mental health", "精神衛生"], "ストレスチェック": ["ストレス調査", "心理的負担", "職業性ストレス", "stress check"], "ストレス": ["心理的負担", "精神的負担", "プレッシャー", "stress", "緊張"], "過重労働": ["長時間労働", "過労", "overwork", "時間外労働", "残業"], "健康診断": ["健診", "健康診査", "ヘルスチェック", "定期健診", "health examination"], "産業医": ["事業場医師", "嘱託医", "occupational physician"], "産業保健": ["職域保健", "労働衛生", "occupational health", "職場の健康"], "復職支援": ["リワーク", "職場復帰支援", "復帰支援", "return to work"], "職場復帰": ["復職", "リワーク", "return to work"], "労災": ["労働災害", "業務災害", "work injury"], "安全衛生": ["労働安全衛生", "職場安全", "safety and health"], "化学物質": ["有害物質", "危険物質", "chemical substance", "有機溶剤"], "熱中症": ["暑熱障害", "heat stroke", "熱射病"], "テレワーク": ["在宅勤務", "リモートワーク", "remote work"], "両立支援": ["治療と仕事の両立", "ワークライフバランス", "work-life balance"], "ハラスメント": ["パワハラ", "セクハラ", "いじめ", "嫌がらせ", "harassment"], "うつ病": ["うつ", "抑うつ", "depression", "気分障害"], "睡眠": ["不眠", "睡眠障害", "sleep", "insomnia"], "疲労": ["疲れ", "倦怠感", "fatigue", "慢性疲労"], "女性": ["女性労働者", "働く女性", "female", "women"], "高齢": ["高年齢", "シニア", "elderly", "aging"], "健康経営": ["health management", "健康投資", "ホワイト500"], "エンゲージメント": ["ワークエンゲージメント", "work engagement", "働きがい"], "バーンアウト": ["燃え尽き", "燃え尽き症候群", "burnout"]};
    
    const searchInput = document.getElementById('searchInput');
    const synonymsInfo = document.getElementById('synonymsInfo');
    
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') doSearch();
    });
    
    function getSynonyms(keyword) {
      const kw = keyword.toLowerCase();
      let synonyms = [keyword];
      
      // 完全一致でシソーラスを検索
      for (const [key, values] of Object.entries(thesaurus)) {
        if (key.toLowerCase() === kw || key.toLowerCase().includes(kw)) {
          synonyms = synonyms.concat(values);
          synonyms.push(key);
        }
        // 値にも含まれているかチェック
        for (const v of values) {
          if (v.toLowerCase() === kw || v.toLowerCase().includes(kw)) {
            synonyms = synonyms.concat(values);
            synonyms.push(key);
            break;
          }
        }
      }
      
      return [...new Set(synonyms)];
    }
    
    function highlightText(text, keywords) {
      let result = text;
      for (const kw of keywords) {
        const regex = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
      }
      return result;
    }
    
    function doSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) return;
      
      const mode = document.querySelector('input[name="searchMode"]:checked').value;
      let searchTerms = [keyword];
      
      if (mode === 'synonym') {
        searchTerms = getSynonyms(keyword);
        if (searchTerms.length > 1) {
          synonymsInfo.innerHTML = '🔍 検索語: ' + searchTerms.join(', ');
          synonymsInfo.classList.add('show');
        } else {
          synonymsInfo.classList.remove('show');
        }
      } else {
        synonymsInfo.classList.remove('show');
      }
      
      const results = articles.filter(article => {
        const text = (article.title + ' ' + article.authors.join(' ')).toLowerCase();
        return searchTerms.some(term => text.includes(term.toLowerCase()));
      });
      
      renderResults(results, searchTerms);
    }
    
    function renderResults(results, keywords) {
      const area = document.getElementById('resultsArea');
      
      if (results.length === 0) {
        area.innerHTML = `
          <div class="no-results">
            <h3>該当する論文が見つかりませんでした</h3>
            <p>別のキーワードをお試しください</p>
          </div>
        `;
        return;
      }
      
      let html = `
        <div class="results-header">
          <span class="results-count"><strong>${results.length}</strong> 件の論文が見つかりました</span>
        </div>
      `;
      
      for (const r of results) {
        const title = highlightText(r.title, keywords);
        const authors = r.authors.slice(0, 3).join(', ') + (r.authors.length > 3 ? ' 他' : '');
        const issue = r.year ? `${r.year}年 ${r.volume}巻${r.number}号` : '';
        
        html += `
          <a href="${r.link}" target="_blank" class="result-item">
            <div class="result-title">${title}</div>
            <div class="result-meta">
              <span class="result-journal">${r.journal}</span>
              ${authors}${issue ? ' / ' + issue : ''}
            </div>
          </a>
        `;
      }
      
      area.innerHTML = html;
    }
  </script>
